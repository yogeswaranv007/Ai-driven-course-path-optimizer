services:
  - type: web
    name: learning-path-optimizer-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://your-frontend-domain.vercel.app
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app
    autoDeploy: true
    healthCheckPath: /health
